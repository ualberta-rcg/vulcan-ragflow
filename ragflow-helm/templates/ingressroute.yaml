{{- if .Values.ingressRoute.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "ragflow.fullname" . }}
  labels:
    {{- include "ragflow.labels" . | nindent 4 }}
spec:
  entryPoints:
    {{- range .Values.ingressRoute.entryPoints }}
    - {{ . }}
    {{- end }}
  routes:
    - kind: Rule
      match: Host(`{{ .Values.ingressRoute.host }}`)
      services:
        - name: {{ include "ragflow.fullname" . }}
          port: 80
          {{- if .Values.ingressRoute.serversTransport.enabled }}
          serversTransport: {{ include "ragflow.fullname" . }}-transport
          {{- end }}
  tls:
    secretName: {{ .Values.ingressRoute.tls.secretName }}
{{- if .Values.ingressRoute.serversTransport.enabled }}
---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: {{ include "ragflow.fullname" . }}-transport
  labels:
    {{- include "ragflow.labels" . | nindent 4 }}
spec:
  disableHTTP2: {{ .Values.ingressRoute.serversTransport.disableHTTP2 }}
  forwardingTimeouts:
    dialTimeout: {{ .Values.ingressRoute.serversTransport.forwardingTimeouts.dialTimeout }}
    idleConnTimeout: {{ .Values.ingressRoute.serversTransport.forwardingTimeouts.idleConnTimeout }}
    responseHeaderTimeout: {{ .Values.ingressRoute.serversTransport.forwardingTimeouts.responseHeaderTimeout }}
{{- end }}
{{- end }}
