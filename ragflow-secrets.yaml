---
apiVersion: v1
kind: Namespace
metadata:
  name: ragflow

---
# Replace all CHANGEME values with real credentials before applying.
# This file MUST be applied before the helm install,
# because all pods reference these secrets via envFrom.
#
# Copy this file to ragflow-secrets.yaml.secret, fill in real values,
# then: kubectl apply -f ragflow-secrets.yaml.secret
#
# MYSQL_PASSWORD and MYSQL_ROOT_PASSWORD must be the same value.
# MINIO_PASSWORD and MINIO_ROOT_PASSWORD must be the same value.
apiVersion: v1
kind: Secret
metadata:
  name: ragflow-secrets
  namespace: ragflow
type: Opaque
stringData:
  MYSQL_PASSWORD: "CHANGEME"
  MYSQL_ROOT_PASSWORD: "CHANGEME"
  MINIO_PASSWORD: "CHANGEME"
  MINIO_ROOT_PASSWORD: "CHANGEME"
  REDIS_PASSWORD: "CHANGEME"
  OIDC_CLIENT_SECRET: "CHANGEME"
  SECRET_KEY: "CHANGEME"
